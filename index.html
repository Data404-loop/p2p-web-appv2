<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All-in-One Audio Visualizer & Video Exporter</title>
    <style>
        :root {
            --bg-color: #0b0c10;
            --container-bg: #1f2833;
            --accent-color: #66fcf1;
            --text-color: #c5c6c7;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            text-align: center;
            margin: 20px 0;
        }

        header h1 {
            margin: 0;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .main-container {
            display: flex;
            flex-direction: row;
            gap: 20px;
            width: 90%;
            max-width: 1200px;
            background: var(--container-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            margin-bottom: 30px;
        }

        .control-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .visualizer-panel {
            flex: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        label {
            font-weight: bold;
            color: #fff;
            font-size: 14px;
        }

        input[type="file"], select, button {
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #45f3ff;
            background: #0b0c10;
            color: #fff;
            font-size: 14px;
            outline: none;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover, select:hover {
            background: var(--accent-color);
            color: #000;
            font-weight: bold;
            box-shadow: 0 0 10px var(--accent-color);
        }

        button:disabled {
            background: #333;
            color: #777;
            border-color: #555;
            cursor: not-allowed;
            box-shadow: none;
        }

        canvas {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 8px;
            border: 2px solid #45f3ff;
        }

        audio {
            width: 100%;
            margin-top: 15px;
        }

        .status {
            font-size: 14px;
            color: #ff4545;
            font-weight: bold;
            margin-top: 5px;
            text-align: center;
        }

        .recording-active {
            animation: pulse 1s infinite alternate;
            color: #ff0043 !important;
        }

        @keyframes pulse {
            from { opacity: 0.5; }
            to { opacity: 1; }
        }

        @media (max-width: 768px) {
            .main-container {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Pro Audio Visualizer</h1>
        <p>Upload Audio → Select Style → Export Video</p>
    </header>

    <div class="main-container">
        <!-- Left Side Controls -->
        <div class="control-panel">
            <div class="input-group">
                <label for="audioFile">1. Upload Audio (MP3/WAV)</label>
                <input type="file" id="audioFile" accept="audio/*">
            </div>

            <div class="input-group">
                <label for="visualizerStyle">2. Select Visualizer Style (15 Styles)</label>
                <select id="visualizerStyle">
                    <option value="1">1. Classic Frequency Bars</option>
                    <option value="2">2. Center Circular Pulse</option>
                    <option value="3">3. Dual Waveform (Line)</option>
                    <option value="4">4. Retro Neon Equalizer</option>
                    <option value="5">5. Exploding Particle Ring</option>
                    <option value="6">6. Smooth Liquid Wave</option>
                    <option value="7">7. Floating Bubble Spectrum</option>
                    <option value="8">8. Double-Sided Tunnel</option>
                    <option value="9">9. Starburst DNA Matrix</option>
                    <option value="10">10. Cyberpunk Block Grid</option>
                    <option value="11">11. Abstract Geometric Poly</option>
                    <option value="12">12. Heartbeat Pulse Line</option>
                    <option value="13">13. Laser Beam Scanner</option>
                    <option value="14">14. Matrix Rain Audio Drops</option>
                    <option value="15">15. Golden Luxury Ripple</option>
                </select>
            </div>

            <div class="input-group">
                <label for="colorTheme">3. Color Accent</label>
                <select id="colorTheme">
                    <option value="cyan">Neon Cyan</option>
                    <option value="gold">Luxury Gold</option>
                    <option value="magenta">Cyber Pink</option>
                    <option value="matrix">Digital Green</option>
                    <option value="rainbow">Dynamic Rainbow</option>
                </select>
            </div>

            <hr style="border-color: #333; margin: 10px 0;">

            <button id="btnRecord" disabled>🔴 Start Recording Video</button>
            <button id="btnStop" disabled>⏹️ Stop & Export Video</button>
            
            <div id="statusText" class="status">Upload an audio to start</div>
        </div>

        <!-- Right Side Player and Screen -->
        <div class="visualizer-panel">
            <canvas id="visualizerCanvas" width="1280" height="720"></canvas>
            <audio id="audioPlayer" controls></audio>
        </div>
    </div>

    <script>
        const audioFile = document.getElementById('audioFile');
        const audioPlayer = document.getElementById('audioPlayer');
        const canvas = document.getElementById('visualizerCanvas');
        const ctx = canvas.getContext('2d');
        const styleSelect = document.getElementById('visualizerStyle');
        const themeSelect = document.getElementById('colorTheme');
        const btnRecord = document.getElementById('btnRecord');
        const btnStop = document.getElementById('btnStop');
        const statusText = document.getElementById('statusText');

        let audioCtx, analyser, source, bufferLength, dataArray;
        let animationFrameId;
        let mediaRecorder;
        let recordedChunks = [];
        let globalRotation = 0;

        // Colors setup
        function getColor(index, total, theme) {
            if (theme === 'cyan') return `hsl(180, 100%, ${50 + (index/total)*20}%)`;
            if (theme === 'gold') return `hsl(45, 100%, ${40 + (index/total)*30}%)`;
            if (theme === 'magenta') return `hsl(320, 100%, ${50 + (index/total)*20}%)`;
            if (theme === 'matrix') return `hsl(120, 100%, ${40 + (index/total)*20}%)`;
            if (theme === 'rainbow') return `hsl(${(index/total) * 360}, 100%, 50%)`;
            return '#66fcf1';
        }

        // Handle Audio Upload
        audioFile.addEventListener('change', function() {
            const files = this.files;
            if(files.length === 0) return;
            
            const fileURL = URL.createObjectURL(files[0]);
            audioPlayer.src = fileURL;
            
            statusText.textContent = "Audio Loaded! Press Play or Start Recording.";
            statusText.style.color = "#66fcf1";
            btnRecord.disabled = false;
            
            setupAudioContext();
        });

        function setupAudioContext() {
            if (audioCtx) return; // Prevent duplicating context
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            source = audioCtx.createMediaElementSource(audioPlayer);
            source.connect(analyser);
            analyser.connect(audioCtx.destination);
            analyser.fftSize = 512; 
            bufferLength = analyser.frequencyBinCount;
            dataArray = new Uint8Array(bufferLength);
            
            draw();
        }

        // 15 Visualizer Rendering Logic
        function draw() {
            animationFrameId = requestAnimationFrame(draw);
            if(!analyser) return;

            analyser.getByteFrequencyData(dataArray);
            
            const WIDTH = canvas.width;
            const HEIGHT = canvas.height;
            const style = styleSelect.value;
            const theme = themeSelect.value;

            // Background Fill (with slight opacity for motion blur trail)
            ctx.fillStyle = "rgba(11, 12, 16, 0.2)";
            ctx.fillRect(0, 0, WIDTH, HEIGHT);

            globalRotation += 0.002; // Dynamic slow spin for circular modes

            switch (style) {
                case "1": // Classic Frequency Bars
                    let barWidth = (WIDTH / bufferLength) * 1.5;
                    let barHeight;
                    let x = 0;
                    for (let i = 0; i < bufferLength; i++) {
                        barHeight = dataArray[i] * 2.2;
                        ctx.fillStyle = getColor(i, bufferLength, theme);
                        ctx.fillRect(x, HEIGHT - barHeight, barWidth - 2, barHeight);
                        x += barWidth;
                    }
                    break;

                case "2": // Center Circular Pulse
                    ctx.save();
                    ctx.translate(WIDTH / 2, HEIGHT / 2);
                    ctx.rotate(globalRotation);
                    for (let i = 0; i < bufferLength; i++) {
                        let angle = (i / bufferLength) * Math.PI * 2;
                        let value = dataArray[i] * 1.2;
                        let x1 = Math.cos(angle) * 150;
                        let y1 = Math.sin(angle) * 150;
                        let x2 = Math.cos(angle) * (150 + value);
                        let y2 = Math.sin(angle) * (150 + value);
                        ctx.strokeStyle = getColor(i, bufferLength, theme);
                        ctx.lineWidth = 4;
                        ctx.beginPath();
                        ctx.moveTo(x1, y1);
                        ctx.lineTo(x2, y2);
                        ctx.stroke();
                    }
                    ctx.restore();
                    break;

                case "3": // Dual Waveform Line
                    ctx.beginPath();
                    ctx.lineWidth = 5;
                    ctx.strokeStyle = getColor(50, 100, theme);
                    let sliceWidth = WIDTH / bufferLength;
                    let lineX = 0;
                    for (let i = 0; i < bufferLength; i++) {
                        let v = dataArray[i] / 128.0;
                        let y = (v * HEIGHT / 2);
                        if (i === 0) ctx.moveTo(lineX, y);
                        else ctx.lineTo(lineX, y);
                        lineX += sliceWidth;
                    }
                    ctx.stroke();
                    break;

                case "4": // Retro Neon Equalizer
                    let blocks = 15;
                    let blockW = WIDTH / bufferLength * 2;
                    for (let i = 0; i < bufferLength; i += 2) {
                        let val = Math.floor(dataArray[i] / 16);
                        for (let j = 0; j < val; j++) {
                            ctx.fillStyle = getColor(i, bufferLength, theme);
                            ctx.fillRect(i * blockW, HEIGHT - (j * 45), blockW - 4, 35);
                        }
                    }
                    break;

                case "5": // Exploding Particle Ring
                    ctx.save();
                    ctx.translate(WIDTH/2, HEIGHT/2);
                    for(let i=0; i<bufferLength; i+=2) {
                        let angle = (i/bufferLength) * Math.PI * 2;
                        let distance = 100 + dataArray[i] * 1.5;
                        let pX = Math.cos(angle) * distance;
                        let pY = Math.sin(angle) * distance;
                        ctx.fillStyle = getColor(i, bufferLength, theme);
                        ctx.beginPath();
                        ctx.arc(pX, pY, dataArray[i]*0.05 + 2, 0, Math.PI*2);
                        ctx.fill();
                    }
                    ctx.restore();
                    break;

                case "6": // Smooth Liquid Wave
                    ctx.beginPath();
                    ctx.fillStyle = getColor(20, 100, theme);
                    ctx.moveTo(0, HEIGHT);
                    for (let i = 0; i < bufferLength; i++) {
                        let lY = HEIGHT - (dataArray[i] * 1.8) - 50;
                        let lX = (i / bufferLength) * WIDTH * 1.2;
                        ctx.lineTo(lX, lY);
                    }
                    ctx.lineTo(WIDTH, HEIGHT);
                    ctx.fill();
                    break;

                case "7": // Floating Bubble Spectrum
                    for (let i = 0; i < bufferLength; i += 8) {
                        let size = dataArray[i] * 0.4;
                        ctx.fillStyle = getColor(i, bufferLength, theme);
                        ctx.globalAlpha = 0.3;
                        ctx.beginPath();
                        ctx.arc((i/bufferLength)*WIDTH + 50, HEIGHT/2 - (dataArray[i]*0.5), size, 0, Math.PI*2);
                        ctx.fill();
                        ctx.globalAlpha = 1.0;
                    }
                    break;

                case "8": // Double-Sided Tunnel
                    for (let i = 0; i < bufferLength; i++) {
                        let h = dataArray[i] * 1.5;
                        ctx.fillStyle = getColor(i, bufferLength, theme);
                        ctx.fillRect((i*6), HEIGHT/2 - h/2, 4, h);
                    }
                    break;

                case "9": // Starburst DNA Matrix
                    ctx.save();
                    ctx.translate(WIDTH/2, HEIGHT/2);
                    ctx.rotate(-globalRotation * 2);
                    for(let i=0; i<bufferLength; i++) {
                        let size = dataArray[i]*0.8;
                        ctx.strokeStyle = getColor(i, bufferLength, theme);
                        ctx.strokeRect(-size/2, -size/2, size, size);
                    }
                    ctx.restore();
                    break;

                case "10": // Cyberpunk Block Grid
                    let gridRows = 8;
                    let gridCols = 16;
                    let cellW = WIDTH / gridCols;
                    let cellH = HEIGHT / gridRows;
                    for (let r = 0; r < gridRows; r++) {
                        for (let c = 0; c < gridCols; c++) {
                            let index = (r * gridCols + c) % bufferLength;
                            if (dataArray[index] > 120) {
                                ctx.fillStyle = getColor(index, bufferLength, theme);
                                ctx.fillRect(c * cellW + 2, r * cellH + 2, cellW - 4, cellH - 4);
                            }
                        }
                    }
                    break;

                case "11": // Abstract Geometric Poly
                    ctx.beginPath();
                    ctx.strokeStyle = getColor(10, 100, theme);
                    ctx.lineWidth = 2;
                    for (let i = 0; i < bufferLength; i += 10) {
                        let radius = dataArray[i] * 1.4;
                        let xP = WIDTH/2 + Math.cos(i) * radius;
                        let yP = HEIGHT/2 + Math.sin(i) * radius;
                        ctx.lineTo(xP, yP);
                    }
                    ctx.closePath();
                    ctx.stroke();
                    break;

                case "12": // Heartbeat Pulse Line
                    ctx.beginPath();
                    ctx.lineWidth = 6;
                    ctx.strokeStyle = '#ff0055';
                    for(let i=0; i<bufferLength; i++) {
                        let px = (i/bufferLength) * WIDTH;
                        let py = (HEIGHT/2) + (dataArray[i] > 180 ? (Math.random() - 0.5)*dataArray[i] : 0);
                        if(i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
                    }
                    ctx.stroke();
                    break;

                case "13": // Laser Beam Scanner
                    let maxVal = Math.max(...dataArray);
                    ctx.fillStyle = getColor(70, 100, theme);
                    ctx.fillRect(0, HEIGHT - (maxVal*2.5), WIDTH, 8);
                    ctx.shadowBlur = 20;
                    ctx.shadowColor = getColor(70,100,theme);
                    break;

                case "14": // Matrix Rain Audio Drops
                    for(let i=0; i<bufferLength; i+=4) {
                        let speed = dataArray[i]*0.1;
                        ctx.fillStyle = getColor(i, bufferLength, 'matrix');
                        ctx.fillRect((i/bufferLength)*WIDTH, (dataArray[i]*2)%HEIGHT, 3, 20 + speed);
                    }
                    break;

                case "15": // Golden Luxury Ripple
                    ctx.save();
                    ctx.translate(WIDTH/2, HEIGHT/2);
                    for(let r=50; r<400; r+=50) {
                        let energy = dataArray[Math.floor(r)%bufferLength] * 0.2;
                        ctx.strokeStyle = getColor(r, 400, 'gold');
                        ctx.lineWidth = 2 + energy;
                        ctx.beginPath();
                        ctx.arc(0, 0, r + energy, 0, Math.PI*2);
                        ctx.stroke();
                    }
                    ctx.restore();
                    break;
            }
            // Reset shadows to keep rendering performant
            ctx.shadowBlur = 0;
        }

        // VIDEO EXPORT / RECORDING LOGIC
        btnRecord.addEventListener('click', function() {
            if(audioPlayer.paused) {
                audioPlayer.play();
            }
            
            recordedChunks = [];
            // Capture Canvas stream at 30 or 60 frames per second
            const canvasStream = canvas.captureStream(30);
            
            // Mix WebAudio output nodes to video stream track if possible
            // For simple clients, we capture standard video tracks.
            mediaRecorder = new MediaRecorder(canvasStream, {
                mimeType: 'video/webm; codecs=vp9'
            });

            mediaRecorder.ondataavailable = function(e) {
                if (e.data.size > 0) {
                    recordedChunks.push(e.data);
                }
            };

            mediaRecorder.onstop = function() {
                const blob = new Blob(recordedChunks, { type: 'video/webm' });
                const videoURL = URL.createObjectURL(blob);
                
                // Create a temporary downlaod link
                const downloadLink = document.createElement('a');
                downloadLink.href = videoURL;
                downloadLink.download = `Visualizer_Output_${Date.now()}.webm`;
                document.body.appendChild(downloadLink);
                downloadLink.click();
                document.body.removeChild(downloadLink);
                
                statusText.textContent = "Video Exported Successfully!";
                statusText.classList.remove('recording-active');
            };

            mediaRecorder.start();
            statusText.textContent = "🔴 RECORDING ACTIVE... Let the music play.";
            statusText.classList.add('recording-active');
            
            btnRecord.disabled = true;
            btnStop.disabled = false;
        });

        btnStop.addEventListener('click', function() {
            if(mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
                audioPlayer.pause();
                btnRecord.disabled = false;
                btnStop.disabled = true;
            }
        });
    </script>
</body>
</html>
